<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Concentric circles -->
  <circle cx="20" cy="20" r="5"  stroke="#00d2ff" stroke-width="0.6" opacity="0.20"/>
  <circle cx="20" cy="20" r="9"  stroke="#00d2ff" stroke-width="0.6" opacity="0.40"/>
  <circle cx="20" cy="20" r="13" stroke="#00d2ff" stroke-width="0.6" opacity="0.60"/>

  <!-- 6 axes from center to outer hexagon vertices -->
  <line x1="20" y1="20" x2="20"    y2="6"     stroke="#00d2ff" stroke-width="0.5" opacity="0.30"/>
  <line x1="20" y1="20" x2="32.12" y2="13"    stroke="#00d2ff" stroke-width="0.5" opacity="0.30"/>
  <line x1="20" y1="20" x2="32.12" y2="27"    stroke="#00d2ff" stroke-width="0.5" opacity="0.30"/>
  <line x1="20" y1="20" x2="20"    y2="34"    stroke="#00d2ff" stroke-width="0.5" opacity="0.30"/>
  <line x1="20" y1="20" x2="7.88"  y2="27"    stroke="#00d2ff" stroke-width="0.5" opacity="0.30"/>
  <line x1="20" y1="20" x2="7.88"  y2="13"    stroke="#00d2ff" stroke-width="0.5" opacity="0.30"/>

  <!-- Irregular radar polygon -->
  <polygon
    points="20,8.1 28.73,14.96 30.91,26.3 20,28.68 10.54,25.46 11.76,15.24"
    fill="rgba(0,210,255,0.15)"
    stroke="#00d2ff"
    stroke-width="1.5"
    stroke-linejoin="round"
  />

  <!-- 6 vertex dots -->
  <circle cx="20"    cy="6"     r="1.5" fill="#00d2ff"/>
  <circle cx="32.12" cy="13"    r="1.5" fill="#00d2ff"/>
  <circle cx="32.12" cy="27"    r="1.5" fill="#00d2ff"/>
  <circle cx="20"    cy="34"    r="1.5" fill="#00d2ff"/>
  <circle cx="7.88"  cy="27"    r="1.5" fill="#00d2ff"/>
  <circle cx="7.88"  cy="13"    r="1.5" fill="#00d2ff"/>

  <!-- Central glowing point -->
  <circle cx="20" cy="20" r="2"
    fill="white"
    filter="drop-shadow(0 0 4px #00d2ff)"
  />
</svg>
